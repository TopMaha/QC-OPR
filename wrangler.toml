name = "qc-opr"
main = "worker.js"
compatibility_date = "2024-09-23"

# D1 — สร้างด้วย:  wrangler d1 create qc-opr
# แล้วเอา database_id ที่ได้มาใส่ตรงนี้
[[d1_databases]]
binding = "DB"
database_name = "qc-opr"
database_id = "PUT-YOUR-D1-DATABASE-ID-HERE"

# (ทางเลือก) เสิร์ฟ PWA จาก Worker เดียวกัน — uncomment เพื่อให้ Worker เสิร์ฟ index.html ด้วย
# [assets]
# directory = "."
# binding = "ASSETS"
