name = "qc-opr"
main = "worker.js"
compatibility_date = "2024-09-23"

# D1 — สร้างด้วย:  wrangler d1 create qc-opr
# แล้วเอา database_id ที่ได้มาใส่ตรงนี้
[[d1_databases]]
binding = "DB"
database_name = "qc-opr"
database_id = "80cb9b3c-feec-4ab4-a322-52dac91831a2"

# เสิร์ฟ PWA (index.html) จาก Worker เดียวกัน → เปิด URL ของ Worker ได้ทั้งแอปและ API
# ทำให้ทุกเครื่องเห็นข้อมูลชุดเดียวกันโดยไม่ต้องตั้งค่า URL เอง (same-origin)
[assets]
directory = "."
binding = "ASSETS"
